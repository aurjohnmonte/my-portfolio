<style>
  body {
    padding: 0;
    margin: 0;
    overflow: hidden;
  }

  .loading-container {
    position: fixed;
    top: 0;
    left: 0;
    background-color: rgb(19, 1, 1);
    z-index: 100;
    width: 100%;
    height: 100vh;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;

    text-align: center;
    font-family: Inter, system-ui, sans-serif;

    opacity: 1;
    visibility: visible;

    transition:
      opacity 1s ease,
      visibility 1s ease;
  }

  .hide-loader {
    opacity: 0;
    visibility: hidden;
  }
</style>
